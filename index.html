  :root{
    --paper:#f2eee4;
    --paper-2:#ece7da;
    --ink:#201e17;
    --ink-soft:#4a4638;
    --ink-faint:#8c8570;

    /* connector + ring vocabulary (monochrome poster look) */
    --line:#201e17;          /* default skeleton line */
    --line-on:#201e17;       /* advanced / confirmed */
    --line-off:#cfc8b6;      /* eliminated */
    --ring:rgba(0,0,0,0.24); /* hairline around a flag */

    --font-title:800 clamp(26px,3.4vw,40px)/1 "Inter", "Helvetica Neue", Arial, sans-serif;
    --font-label:600 11px/1 "Inter", "Helvetica Neue", Arial, sans-serif;
    --font-body:400 14px/1.5 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  }

  *{box-sizing:border-box;}

  html,body{margin:0;background:var(--paper);color:var(--ink);}

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    font-family:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .poster-head{
    text-align:center;
    padding:28px 20px 4px;
  }
  .poster-head h1{
    margin:0;
    font:var(--font-title);
    letter-spacing:-0.02em;
    color:var(--ink);
    text-wrap:balance;
  }

  .bracket-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:visible;
    padding:20px clamp(16px,4vw,40px) 28px;
  }

  svg#bracket{
    width:min(80vw, 78vh, 780px);
    min-width:460px;
    height:auto;
    display:block;
    margin:auto;
  }

  /* Below ~460px the desktop min-width would force horizontal overflow, and
     centering the circle in a full flex(1) column on a tall narrow phone
     leaves large dead bands above/below it. Let width lead instead of a
     landscape-tuned vh figure, drop the floor, and let the page size to its
     content instead of stretching to fill the screen height. */
  @media (max-width: 700px){
    .poster-head{padding:20px 16px 2px;}
    .bracket-wrap{
      flex:none;
      padding:8px 10px 16px;
    }
    svg#bracket{
      width:min(96vw, 96vh);
      min-width:0;
    }
  }

  .poster-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    padding:10px clamp(20px,4vw,48px) 28px;
  }

  .foot-left{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}

  .legend{
    display:flex;
    gap:16px;
    font:var(--font-mono);
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .legend span{display:flex;align-items:center;gap:6px;}
  .legend i{width:14px;height:2.5px;display:inline-block;border-radius:2px;}
  .poster-foot{
    justify-content:center;
    text-align:center;
  }

  .foot-inner{
    display:flex;
    align-items:center;
    gap:14px;
    font:var(--font-mono);
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-faint);
  }
  .foot-inner .dot{opacity:0.5;}

  button#resetBtn{
    font:var(--font-mono);
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    background:transparent;
    border:none;
    padding:4px 2px;
    cursor:pointer;
    border-bottom:1px solid transparent;
    transition:color .12s ease, border-color .12s ease;
  }
  button#resetBtn:hover{color:var(--ink);border-bottom-color:var(--ink);}
  button#resetBtn:focus-visible{outline:2px solid var(--ink);outline-offset:3px;}

  .team-node{
    cursor:pointer;
    transform-box:fill-box;
    transform-origin:center;
    transition:transform .15s ease;
  }
  .team-node:hover{transform:scale(1.1);}
  .team-node:focus-visible{outline:none;}
  .team-node:focus-visible circle.ring{stroke:var(--ink);stroke-width:3px;}
  .team-node circle.ring{transition:stroke .15s ease, stroke-width .15s ease;}
  .team-node.eliminated{opacity:0.4;}

  .code-txt{display:none;}

  .champion-name{font:700 15px/1 "Inter", "Helvetica Neue", Arial, sans-serif;letter-spacing:-0.01em;fill:var(--ink);text-anchor:middle;}
  .champion-label{font:var(--font-mono);fill:var(--ink-faint);text-anchor:middle;letter-spacing:0.18em;}

  .hover-icon{cursor:default;}
  .hover-icon circle.dial{transition:stroke .12s ease, fill .12s ease;}
  .hover-icon:hover circle.dial, .hover-icon:focus-visible circle.dial{fill:var(--ink); stroke:var(--ink);}
  .hover-icon:hover .dial-hand, .hover-icon:focus-visible .dial-hand{stroke:var(--paper);}
  .hover-icon:focus-visible{outline:none;}
  .dial-hand{stroke:var(--ink); transition:stroke .12s ease;}

  .match-tip{
    position:fixed;
    left:0; top:0;
    z-index:1000;
    background:var(--paper);
    border:1.4px solid var(--ink);
    border-radius:9px;
    padding:8px 13px;
    box-shadow:0 6px 18px rgba(32,30,23,0.16);
    pointer-events:none;
    max-width:230px;
    text-align:center;
    opacity:0;
    transform:translate(-50%,-100%) translateY(-9px) scale(0.94);
    transition:opacity 90ms ease, transform 90ms ease;
    will-change:transform, opacity;
  }
  .match-tip.visible{opacity:1; transform:translate(-50%,-100%) translateY(-13px) scale(1);}
  .match-tip.below{transform:translate(-50%,0) translateY(9px) scale(0.94);}
  .match-tip.below.visible{transform:translate(-50%,0) translateY(13px) scale(1);}
  .match-tip-round{font:var(--font-mono);color:var(--ink-faint);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}
  .match-tip-main{font:700 12.5px/1.35 "Inter","Helvetica Neue",Arial,sans-serif;color:var(--ink);}
  .match-tip-sub{font:var(--font-mono);color:var(--ink-faint);letter-spacing:0.04em;margin-top:4px;}

  /* Touch-device equivalent of the floating tooltip: a bottom sheet with a
     real, generously-sized "Advance" button, since precise hover isn't
     available and a floating card would have to dodge screen edges on a
     small display. */
  .sheet-backdrop{
    position:fixed; inset:0; z-index:1000;
    background:rgba(28,26,21,0.32);
    opacity:0; pointer-events:none;
    transition:opacity 180ms ease;
  }
  .sheet-backdrop.visible{opacity:1; pointer-events:auto;}

  .match-sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:1001;
    max-width:480px; margin:0 auto;
    background:var(--paper);
    border-radius:18px 18px 0 0;
    box-shadow:0 -10px 34px rgba(28,26,23,0.22);
    padding:12px 22px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(100%);
    transition:transform 240ms cubic-bezier(.22,.85,.32,1);
  }
  .match-sheet.visible{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; margin:0 auto 16px; border-radius:2px; background:var(--ink-faint); opacity:0.5;}
  .sheet-round{font:var(--font-mono);color:var(--ink-faint);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;}
  .sheet-main{font:800 19px/1.3 "Inter","Helvetica Neue",Arial,sans-serif;color:var(--ink);}
  .sheet-sub{font:var(--font-mono);color:var(--ink-faint);letter-spacing:0.04em;margin-top:6px;}
  .sheet-advance{
    display:block; width:100%; margin-top:20px; padding:15px;
    background:var(--ink); color:var(--paper); border:none; border-radius:11px;
    font:700 15px "Inter","Helvetica Neue",Arial,sans-serif; letter-spacing:0.01em;
    cursor:pointer;
  }
  .sheet-advance:active{opacity:0.85;}
  .sheet-advance[hidden]{display:none;}
  .sheet-close{
    display:block; width:100%; margin-top:10px; padding:11px;
    background:transparent; color:var(--ink-soft); border:1.4px solid var(--ring); border-radius:11px;
    font:600 13px "Inter","Helvetica Neue",Arial,sans-serif;
    cursor:pointer;
  }
  .sheet-advance:focus-visible, .sheet-close:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
    .match-tip{transition:none !important;}
    .sheet-backdrop, .match-sheet{transition:none !important;}
  }

l=\"#eee\" d=\"m0 144 256-32 256 32v224l-256 32L0 368Z\"/><path fill=\"#d80027\" d=\"M0 0h512v144H0Z\"/><path fill=\"#333\" d=\"M0 368h512v144H0Z\"/><path fill=\"#ff9811\" d=\"M250 191c-8 0-17 4-22 14 5-3 16-1 16 13 0 4-2 8-5 10-8 0-14-14-29-14-10 0-19 7-19 17v69l46-7-14 27h66l-14-27 46 7v-69c0-10-9-17-19-17-15 0-21 14-29 14 8-23-7-37-23-37z\"/></g></symbol><symbol id=\"flag-ch\" viewBox=\"0 0 512 512\"><mask id=\"fm-ch\"><circle cx=\"256\" cy=\"256\" r=\"256\" fill=\"#fff\"/></mask><g mask=\"url(#fm-ch)\"><path fill=\"#d80027\" d=\"M0 0h512v512H0z\"/><path fill=\"#eee\" d=\"M389.6 211.5h-89v-89h-89.1v89h-89v89h89v89h89v-89h89z\"/></g></symbol><symbol id=\"flag-dz\" viewBox=\"0 0 512 512\"><mask id=\"fm-dz\"><circle cx=\"256\" cy=\"256\" r=\"256\" fill=\"#fff\"/></mask><g mask=\"url(#fm-dz)\"><path fill=\"#496e2d\" d=\"M0 0h256l32 256-32 256H0Z\"/><path fill=\"#eee\" d=\"M256 0h256v512H256z\"/><path fill=\"#d80027\" d=\"M245 167a89 89 0 1 0 67 153 72 72 0 0 1-35 8 72 72 0 1 1 35-136 89 89 0 0 0-67-25m66 40-21 29-34-11 21 29-21 29 34-11 21 29v-36l34-11-34-11z\"/></g></symbol><symbol id=\"flag-co\" viewBox=\"0 0 512 512\"><mask id=\"fm-co\"><circle cx=\"256\" cy=\"256\" r=\"256\" fill=\"#fff\"/></mask><g mask=\"url(#fm-co)\"><path fill=\"#d80027\" d=\"m0 384 255.8-29.7L512 384v128H0z\"/><path fill=\"#0052b4\" d=\"m0 256 259.5-31L512 256v128H0z\"/><path fill=\"#ffda44\" d=\"M0 0h512v256H0z\"/></g></symbol><symbol id=\"flag-gh\" viewBox=\"0 0 512 512\"><mask id=\"fm-gh\"><circle cx=\"256\" cy=\"256\" r=\"256\" fill=\"#fff\"/></mask><g mask=\"url(#fm-gh)\"><path fill=\"#ffda44\" d=\"m0 167 256-32 256 32v178l-256 32L0 345Z\"/><path fill=\"#d80027\" d=\"M0 0h512v167H0Z\"/><path fill=\"#496e2d\" d=\"M0 345h512v167H0Z\"/><path fill=\"#333\" d=\"m198 345 151-109H163l151 109-58-178Z\"/></g></symbol>";
  var $clipDefs = document.getElementById("clipDefs");
  var $lines = document.getElementById("lines");
  var $nodes = document.getElementById("nodes");
  var $center = document.getElementById("center");

  function clearGroup(g){ while (g.firstChild) g.removeChild(g.firstChild); }

  // ---- match info lookup + custom tooltip (instant, styled — no native <title> delay) ----

  function getMatchInfo(r, i){
    if (r < 1) return null;
    var forRound = MATCH_INFO_BY_ROUND[r - 1];
    return (forRound && forRound[i]) || null;
  }

  function matchTipLines(info, team, otherTeam, roundKey){
    var round = ROUND_LABELS[roundKey] || "";
    if (info && info.played){
      return {round: round, main: info.score, sub: info.date + " · " + info.time};
    }
    var main = (team ? team.name : "?") + " vs " + (otherTeam ? otherTeam.name : "?");
    var sub = info ? (info.date + " · " + info.time) : "Date & time TBC";
    return {round: round, main: main, sub: sub};
  }

  var $tip = document.getElementById("matchTip");
  var $tipRound = $tip.querySelector(".match-tip-round");
  var $tipMain = $tip.querySelector(".match-tip-main");
  var $tipSub = $tip.querySelector(".match-tip-sub");

  function showTip(targetEl, round, main, sub){
    $tipRound.textContent = round;
    $tipMain.textContent = main;
    $tipSub.textContent = sub;
    var rect = targetEl.getBoundingClientRect();
    var cx = Math.min(Math.max(rect.left + rect.width / 2, 120), window.innerWidth - 120);
    var showBelow = rect.top < 90;
    $tip.classList.toggle("below", showBelow);
    $tip.style.left = cx + "px";
    $tip.style.top = (showBelow ? rect.bottom : rect.top) + "px";
    $tip.classList.add("visible");
  }

  function hideTip(){
    $tip.classList.remove("visible");
  }

  function wireTip(el, getLines){
    el.addEventListener("mouseenter", function(){
      var lines = getLines();
      showTip(el, lines.round, lines.main, lines.sub);
    });
    el.addEventListener("mouseleave", hideTip);
    el.addEventListener("focusin", function(){
      var lines = getLines();
      showTip(el, lines.round, lines.main, lines.sub);
    });
    el.addEventListener("focusout", hideTip);
  }

  // ---- bottom sheet: the touch equivalent of hover-to-preview / click-to-commit ----

  function isTouchDevice(){
    return !!(window.matchMedia && window.matchMedia("(hover: none)").matches);
  }

  var $backdrop = document.getElementById("sheetBackdrop");
  var $sheet = document.getElementById("matchSheet");
  var $sheetRound = document.getElementById("sheetRound");
  var $sheetMain = document.getElementById("sheetMain");
  var $sheetSub = document.getElementById("sheetSub");
  var $sheetAdvance = document.getElementById("sheetAdvance");
  var $sheetClose = document.getElementById("sheetClose");
  var sheetReturnFocus = null;

  function openSheet(lines, advanceLabel, onAdvance){
    hideTip();
    sheetReturnFocus = document.activeElement;
    $sheetRound.textContent = lines.round;
    $sheetMain.textContent = lines.main;
    $sheetSub.textContent = lines.sub;
    if (onAdvance){
      $sheetAdvance.hidden = false;
      $sheetAdvance.textContent = "Advance " + advanceLabel + " →";
      $sheetAdvance.onclick = function(){ onAdvance(); closeSheet(); };
    } else {
      $sheetAdvance.hidden = true;
      $sheetAdvance.onclick = null;
    }
    $backdrop.classList.add("visible");
    $sheet.classList.add("visible");
    $sheetClose.focus();
  }

  function closeSheet(){
    $backdrop.classList.remove("visible");
    $sheet.classList.remove("visible");
    if (sheetReturnFocus && typeof sheetReturnFocus.focus === "function") sheetReturnFocus.focus();
    sheetReturnFocus = null;
  }

  $backdrop.addEventListener("click", closeSheet);
  $sheetClose.addEventListener("click", closeSheet);
  document.addEventListener("keydown", function(ev){
    if (ev.key === "Escape" && $sheet.classList.contains("visible")) closeSheet();
  });

  function flagCircle(parent, p, radius, isoCode, clipId){
    var clip = el("clipPath", {id: clipId});
    clip.appendChild(el("circle", {cx: p.x, cy: p.y, r: radius}));
    $clipDefs.appendChild(clip);

    // circle-flags icons are already circular internally, but clipping to our
    // own exact circle keeps every node pixel-identical regardless of that.
    var clipped = el("g", {"clip-path": "url(#" + clipId + ")"});
    clipped.appendChild(el("use", {
      href: "#flag-" + isoCode,
      x: p.x - radius, y: p.y - radius, width: radius * 2, height: radius * 2
    }));
    parent.appendChild(clipped);
  }

  function render(){
    clearGroup($lines);
    clearGroup($nodes);
    clearGroup($center);
    clearGroup($clipDefs);

    for (var r = 0; r <= 4; r++){
      for (var i = 0; i < SIZES[r]; i++){
        var team = winners[r][i];
        var p = pos[r][i];
        var childIdx = Math.floor(i / 2);
        var childPos = pos[r+1][childIdx];
        var childTeam = winners[r+1][childIdx];

        var confirmed = !!(team && childTeam && childTeam.code === team.code);
        var eliminated = !!(team && childTeam && !confirmed);

        var spokeStroke = confirmed ? "var(--line-on)" : eliminated ? "var(--line-off)" : "var(--line)";

        if (r === 4){
          // final: radial spokes run straight into the centre (behind the trophy)
          var fSpoke = el("line", {
            x1: p.x, y1: p.y, x2: childPos.x, y2: childPos.y,
            stroke: spokeStroke, "stroke-width": confirmed ? "2.6" : "1.5", "stroke-linecap": "round"
          });
          if (eliminated) fSpoke.setAttribute("opacity", "0.5");
          $lines.appendChild(fSpoke);
        } else {
          // ---- radial spoke -> concentric arc -> radial tail (every joint a right angle) ----
          var rbar = RADII[r+1] + 0.16 * (RADII[r] - RADII[r+1]);
          var elbow = angPoint(p.angle, rbar);

          var spoke = el("line", {
            x1: p.x, y1: p.y, x2: elbow.x, y2: elbow.y,
            stroke: spokeStroke, "stroke-width": confirmed ? "2.6" : "1.5", "stroke-linecap": "round"
          });
          if (eliminated) spoke.setAttribute("opacity", "0.5");
          $lines.appendChild(spoke);

          // small joint dot at the elbow
          var jdot = el("circle", {cx: elbow.x, cy: elbow.y, r: "2.6",
            fill: eliminated ? "var(--line-off)" : "var(--line)"});
          if (eliminated) jdot.setAttribute("opacity", "0.5");
          $lines.appendChild(jdot);

          // Arc along the concentric circle joining the sibling elbows, then a radial
          // tail down to the parent slot (drawn once per pair, from the even index).
          // Split at the midpoint into two independently-styled halves, each matching
          // its own side's spoke — otherwise the arc reads as one neutral connector
          // even when one side advanced and the other was eliminated.
          if (i % 2 === 0){
            var sib = pos[r][i+1];
            var elbowB = angPoint(sib.angle, rbar);
            var midAngle = (p.angle + sib.angle) / 2;
            var arcMid = angPoint(midAngle, rbar);

            var sibTeam = winners[r][i+1];
            var sibConfirmed = !!(sibTeam && childTeam && childTeam.code === sibTeam.code);
            var sibEliminated = !!(sibTeam && childTeam && !sibConfirmed);
            var sibStroke = sibConfirmed ? "var(--line-on)" : sibEliminated ? "var(--line-off)" : "var(--line)";

            var arcA = el("path", {
              d: "M " + elbow.x + " " + elbow.y + " A " + rbar + " " + rbar + " 0 0 1 " + arcMid.x + " " + arcMid.y,
              fill: "none", stroke: spokeStroke, "stroke-width": confirmed ? "2.6" : "1.5", "stroke-linecap": "round"
            });
            if (eliminated) arcA.setAttribute("opacity", "0.5");
            $lines.appendChild(arcA);

            var arcB = el("path", {
              d: "M " + arcMid.x + " " + arcMid.y + " A " + rbar + " " + rbar + " 0 0 1 " + elbowB.x + " " + elbowB.y,
              fill: "none", stroke: sibStroke, "stroke-width": sibConfirmed ? "2.6" : "1.5", "stroke-linecap": "round"
            });
            if (sibEliminated) arcB.setAttribute("opacity", "0.5");
            $lines.appendChild(arcB);

            $lines.appendChild(el("line", {
              x1: arcMid.x, y1: arcMid.y, x2: childPos.x, y2: childPos.y,
              stroke: "var(--line)", "stroke-width": "1.5", "stroke-linecap": "round"
            }));
          }
        }

        // Hover info lives on the INSIDE node — the slot a match resolves into —
        // rather than on the two outer competing flags. getMatchInfo(r,i) looks
        // at MATCH_INFO_BY_ROUND[r-1][i], i.e. the match feeding into (r,i).
        var matchInfo = getMatchInfo(r, i);

        if (team){
          var cls = "team-node" + (confirmed ? " advanced" : "") + (eliminated ? " eliminated" : "");

          // Screen readers only get the aria-label (no hover/focus tooltip
          // parsing), so fold the same round + score/date context sighted and
          // keyboard users see into it, rather than just "click to advance".
          var srcAforLabel = winners[r-1] && winners[r-1][2*i];
          var srcBforLabel = winners[r-1] && winners[r-1][2*i+1];
          var otherForLabel = (srcAforLabel && srcAforLabel.code === team.code) ? srcBforLabel : srcAforLabel;
          var statusWord = confirmed ? "advancing" : eliminated ? "eliminated" : "click to advance";
          var contextLines = matchInfo ? matchTipLines(matchInfo, team, otherForLabel, r - 1) : null;
          var ariaLabel = contextLines
            ? team.name + " — " + contextLines.round + ", " + contextLines.main + ", " + contextLines.sub + " (" + statusWord + ")"
            : team.name + " (" + statusWord + ")";

          var g = el("g", {
            class: cls, tabindex: "0", role: "button",
            "aria-label": ariaLabel
          });

          // Invisible, slightly oversized hit area — the visual flag stays
          // compact, but the tappable/clickable region is a bit more forgiving,
          // which matters most on touch screens.
          g.appendChild(el("circle", {
            cx: p.x, cy: p.y, r: NODE_R[r] + 6, fill: "transparent", "pointer-events": "all"
          }));

          flagCircle(g, p, NODE_R[r], FLAG_ID[team.code], "clip" + r + "_" + i);

          var ringColor = confirmed ? "var(--ink)" : eliminated ? "var(--line-off)" : "var(--ring)";
          g.appendChild(el("circle", {
            class: "ring", cx: p.x, cy: p.y, r: NODE_R[r],
            fill: "none", stroke: ringColor, "stroke-width": confirmed ? "2" : "1.2"
          }));

          var labelAngleRad = p.angle * Math.PI / 180;
          var lx = p.x + Math.cos(labelAngleRad) * (NODE_R[r] + 15);
          var ly = p.y + Math.sin(labelAngleRad) * (NODE_R[r] + 15);
          var codeTxt = el("text", {x: lx, y: ly + 3, class: "code-txt"});
          codeTxt.textContent = team.code;
          g.appendChild(codeTxt);

          (function(rr, ii, thisTeam, mi, srcA, srcB, roundKey){
            var otherTeam = (srcA && srcA.code === thisTeam.code) ? srcB : srcA;
            var getLines = mi ? function(){ return matchTipLines(mi, thisTeam, otherTeam, roundKey); } : null;

            // Mouse: hover previews (if there's anything to preview), click commits
            // immediately — unchanged from before. Touch has no hover, so a tap
            // opens the bottom sheet to preview + commit via its own explicit
            // button instead of committing on the first, possibly mis-aimed, tap.
            g.addEventListener("click", function(){
              if (isTouchDevice() && getLines){
                openSheet(getLines(), thisTeam.name, function(){ pick(rr, ii); });
              } else {
                pick(rr, ii);
              }
            });
            g.addEventListener("keydown", function(ev){
              if (ev.key === "Enter" || ev.key === " "){ ev.preventDefault(); pick(rr, ii); }
            });
            if (getLines) wireTip(g, getLines);
          })(r, i, team, matchInfo, winners[r-1] && winners[r-1][2*i], winners[r-1] && winners[r-1][2*i+1], r - 1);

          $nodes.appendChild(g);
        } else {
          // Not yet resolved: a small clock icon marks every open slot, all the
          // way in to the Final, as a hover zone — not just the ones we already
          // have a schedule for. Falls back to "? vs ?" when the teams feeding
          // into this slot aren't known yet either.
          var srcA = winners[r-1] && winners[r-1][2*i];
          var srcB = winners[r-1] && winners[r-1][2*i+1];
          var iconLines = matchTipLines(matchInfo, srcA, srcB, r - 1);
          var iconG = el("g", {
            class: "hover-icon", tabindex: "0", role: "img",
            "aria-label": iconLines.round + ": " + iconLines.main + ", " + iconLines.sub
          });
          iconG.appendChild(el("circle", {
            cx: p.x, cy: p.y, r: "14", fill: "transparent", "pointer-events": "all"
          }));
          iconG.appendChild(el("circle", {
            class: "dial", cx: p.x, cy: p.y, r: "8", fill: "var(--paper)", stroke: "var(--ink)", "stroke-width": "1.4"
          }));
          iconG.appendChild(el("line", {
            class: "dial-hand", x1: p.x, y1: p.y, x2: p.x, y2: p.y - 4.1, "stroke-width": "1.3", "stroke-linecap": "round"
          }));
          iconG.appendChild(el("line", {
            class: "dial-hand", x1: p.x, y1: p.y, x2: p.x + 3.4, y2: p.y, "stroke-width": "1.3", "stroke-linecap": "round"
          }));
          (function(mi, teamA, teamB, roundKey){
            var getLines = function(){ return matchTipLines(mi, teamA, teamB, roundKey); };
            wireTip(iconG, getLines);
            // Nothing to advance yet, so a tap just opens the sheet read-only
            // (no button) — informational parity with hovering on desktop.
            iconG.addEventListener("click", function(){
              if (isTouchDevice()) openSheet(getLines(), null, null);
            });
          })(matchInfo, srcA, srcB, r - 1);
          $nodes.appendChild(iconG);
        }
      }
    }

    // champion / trophy
    var champ = winners[5][0];
    var trophy = el("g", {transform: "translate(" + CENTER + "," + CENTER + ")"});
    // paper disc masks the converging tails so the trophy sits in clean space
    trophy.appendChild(el("circle", {cx: 0, cy: 0, r: 48, fill: "var(--paper)"}));

    // filled dark trophy silhouette
    var tg = el("g", {transform: "translate(0,-4) scale(1.15)", fill: "var(--ink)", stroke: "none"});
    // bowl of the cup
    tg.appendChild(el("path", {d: "M -15,-26 C -15,-6 -9,3 0,3 C 9,3 15,-6 15,-26 Z"}));
    // handles
    tg.appendChild(el("path", {d: "M -15,-25 C -27,-25 -27,-8 -15,-6 L -15,-10 C -22,-11 -22,-21 -15,-21 Z"}));
    tg.appendChild(el("path", {d: "M 15,-25 C 27,-25 27,-8 15,-6 L 15,-10 C 22,-11 22,-21 15,-21 Z"}));
    // stem
    tg.appendChild(el("rect", {x: -2.4, y: 2, width: 4.8, height: 11}));
    // base
    tg.appendChild(el("path", {d: "M -13,20 L 13,20 L 10,12 L -10,12 Z"}));
    tg.appendChild(el("rect", {x: -15, y: 20, width: 30, height: 3.5, rx: 1.5}));
    trophy.appendChild(tg);

    $center.appendChild(trophy);

    if (champ){
      var cName = el("text", {x: 0, y: 46, class: "champion-name"});
      cName.textContent = champ.name;
      trophy.appendChild(cName);
    } else {
      // Small clock icon beneath the cup: hover for the Final's kickoff time,
      // same visual language as every other open slot in the bracket.
      var finalInfo = getMatchInfo(5, 0);
      if (finalInfo){
        var finalLines = matchTipLines(finalInfo, winners[4][0], winners[4][1], 4);
        var finalIcon = el("g", {
          class: "hover-icon", tabindex: "0", role: "img",
          "aria-label": finalLines.round + ": " + finalLines.main + ", " + finalLines.sub,
          transform: "translate(0,34)"
        });
        finalIcon.appendChild(el("circle", {
          cx: 0, cy: 0, r: "14", fill: "transparent", "pointer-events": "all"
        }));
        finalIcon.appendChild(el("circle", {
          class: "dial", cx: 0, cy: 0, r: "8", fill: "var(--paper)", stroke: "var(--ink)", "stroke-width": "1.4"
        }));
        finalIcon.appendChild(el("line", {
          class: "dial-hand", x1: 0, y1: 0, x2: 0, y2: -4.1, "stroke-width": "1.3", "stroke-linecap": "round"
        }));
        finalIcon.appendChild(el("line", {
          class: "dial-hand", x1: 0, y1: 0, x2: 3.4, y2: 0, "stroke-width": "1.3", "stroke-linecap": "round"
        }));
        (function(fi, finA, finB){
          var getLines = function(){ return matchTipLines(fi, finA, finB, 4); };
          wireTip(finalIcon, getLines);
          finalIcon.addEventListener("click", function(){
            if (isTouchDevice()) openSheet(getLines(), null, null);
          });
        })(finalInfo, winners[4][0], winners[4][1]);
        trophy.appendChild(finalIcon);
      }
    }
  }

  document.getElementById("resetBtn").addEventListener("click", resetAll);

  render();
})();
</script>

</body></html>
